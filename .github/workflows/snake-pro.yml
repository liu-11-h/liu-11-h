name: generate-snake-pro

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Pro Snake
        uses: Platane/snk@v3
        with:
          github_user_name: liu-11-h
          # 圆角 + 渐变 + 高饱和度颜色
          outputs: |
            dist/snake-pro.svg?color_snake=00ffcc&color_dot=ff3366&color_bg=0d1117&radius=8&padding=4&color_snake_gradient=true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output-pro
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
