name: generate-snake-ultimate

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Ultimate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: liu-11-h
          outputs: |
            dist/snake-ultimate.svg?color_snake=ff69b4&color_dot=00ffcc&color_bg=0d1117&stroke_width=3&stroke_color=ffffff
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output-ultimate
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
